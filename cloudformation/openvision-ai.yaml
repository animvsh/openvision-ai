AWSTemplateFormatVersion: '2010-09-09'
Description: 'OpenVision AI - Camera Intelligence Platform'

Parameters:
  ProjectName:
    Type: String
    Default: openvision-ai
    Description: Project name prefix

  Environment:
    Type: String
    Default: production
    Description: Environment name

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16

  LambdaRuntime:
    Type: String
    Default: python3.11

Resources:
  # VPC for network isolation
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-vpc

  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-igw

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Subnets
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-subnet-2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-subnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-subnet-2

  # Elastic IP for NAT Gateway
  NatGateway1EIP:
    Type: AWS::EC2::EIP
    DependsOn: GatewayAttachment
    Properties:
      Domain: vpc

  # NAT Gateway for private subnets
  NATGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      SubnetId: !Ref PublicSubnet1
      AllocationId: !GetAtt NatGateway1EIP.AllocationId

  # Route Tables
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-rt-1

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway1

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  SubnetRouteTableAssociation4:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable1

  # DynamoDB Tables
  CameraTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-cameras-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cameraId
          AttributeType: S
      KeySchema:
        - AttributeName: cameraId
          KeyType: HASH
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-cameras

  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-events-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: timestamp-index
          KeySchema:
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-events

  AlertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-alerts-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: alertId
          AttributeType: S
        - AttributeName: cameraId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: alertId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: camera-index
          KeySchema:
            - AttributeName: cameraId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-alerts

  # SNS Topic for alerts
  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ProjectName}-alerts-${Environment}
      DisplayName: !Sub ${ProjectName} Alerts
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-alerts-topic

  # SQS Queue for event processing
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-events-${Environment}
      VisibilityTimeout: 300
      MessageRetentionPeriod: 86400
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-events-queue

  DLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-events-dlq-${Environment}
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-events-dlq

  EventQueueDLQPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DLQRouting
            Effect: Allow
            Action: sqs:SendMessage
            Resource: !GetAtt EventQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt DLQ.Arn

  # Lambda Functions
  APIFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-api-${Environment}
      Runtime: !Ref LambdaRuntime
      Handler: lambda.handler
      Code: ../services/api
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          AWS_REGION: !Ref AWS::Region
          DYNAMODB_TABLE_CAMERAS: !GetAtt CameraTable.TableName
          DYNAMODB_TABLE_EVENTS: !GetAtt EventsTable.TableName
          DYNAMODB_TABLE_ALERTS: !GetAtt AlertsTable.TableName
          SNS_TOPIC_ARN: !Ref AlertSNSTopic
          SQS_QUEUE_URL: !GetAtt EventQueue.QueueUrl
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-api

  CameraProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-camera-processor-${Environment}
      Runtime: !Ref LambdaRuntime
      Handler: camera_processor.handler
      Timeout: 60
      MemorySize: 512
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
      Environment:
        Variables:
          DYNAMODB_TABLE_CAMERAS: !GetAtt CameraTable.TableName
          DYNAMODB_TABLE_EVENTS: !GetAtt EventsTable.TableName
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-camera-processor

  RekognitionProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-rekognition-processor-${Environment}
      Runtime: !Ref LambdaRuntime
      Handler: rekognition_processor.handler
      Timeout: 120
      MemorySize: 1024
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref AlertSNSTopic
          SQS_QUEUE_URL: !GetAtt EventQueue.QueueUrl
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-rekognition-processor

  BedrockSummarizerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-bedrock-summarizer-${Environment}
      Runtime: !Ref LambdaRuntime
      Handler: bedrock_summarizer.handler
      Timeout: 60
      MemorySize: 512
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
      Environment:
        Variables:
          DYNAMODB_TABLE_EVENTS: !GetAtt EventsTable.TableName
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-bedrock-summarizer

  # Security Group for Lambda
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-lambda-sg
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # API Gateway
  API Gateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${ProjectName}-api-${Environment}
      Description: OpenVision AI API Gateway
      BinaryMediaTypes:
        - '*/*'
      EndpointConfiguration:
        Types:
          - REGIONAL

  APIResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref API Gateway
      ParentId: !GetAtt API Gateway.RootResourceId
      PathPart: '{proxy+}'

  APIAnyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref API Gateway
      ResourceId: !Ref APIResource
      HttpMethod: ANY
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${APIFunction.Arn}/invocations

  APIGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref API Gateway
      ResourceId: !Ref APIResource
      HttpMethod: OPTIONS
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        PassthroughBehavior: NEVER
        RequestTemplates:
          application/json: '{"statusCode": 200}'

  # Outputs
Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${ProjectName}-vpc-id

  APIGatewayURL:
    Description: API Gateway URL
    Value: !Sub https://${API Gateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${ProjectName}-api-url

  DynamoDBCamerasTable:
    Description: Cameras DynamoDB Table
    Value: !GetAtt CameraTable.TableName
    Export:
      Name: !Sub ${ProjectName}-cameras-table

  DynamoDBEventsTable:
    Description: Events DynamoDB Table
    Value: !GetAtt EventsTable.TableName
    Export:
      Name: !Sub ${ProjectName}-events-table

  DynamoDBAlertsTable:
    Description: Alerts DynamoDB Table
    Value: !GetAtt AlertsTable.TableName
    Export:
      Name: !Sub ${ProjectName}-alerts-table

  AlertSNSTopicARN:
    Description: Alert SNS Topic ARN
    Value: !Ref AlertSNSTopic
    Export:
      Name: !Sub ${ProjectName}-alerts-topic-arn

  EventQueueURL:
    Description: Event Queue URL
    Value: !GetAtt EventQueue.QueueUrl
    Export:
      Name: !Sub ${ProjectName}-events-queue-url
